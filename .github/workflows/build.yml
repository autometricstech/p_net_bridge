name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake build-essential
      - name: build
        run: ./build.sh
